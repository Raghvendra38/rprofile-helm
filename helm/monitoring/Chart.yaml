apiVersion: v2
name: monitoring
description: Loki + Promtail + Grafana monitoring stack for rprofile EKS cluster
type: application
version: 1.0.0
appVersion: "1.0"
dependencies:
  - name: loki-stack
    version: "2.10.2"
    repository: https://grafana.github.io/helm-charts
    condition: loki-stack.enabled
  - name: grafana
    version: "7.3.9"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled